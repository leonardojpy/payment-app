spring.application.name=pagamentos

spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DATABASE:picpaydb}
spring.datasource.username=${MYSQL_USER:admin}
spring.datasource.password=${MYSQL_PASSWORD:123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

clients.authorization.url=${AUTHORIZATION_URL:https://util.devi.tools/api/v2}
clients.notification.url=${NOTIFICATION_URL:https://util.devi.tools/api/v1}
